name: iOS TestFlight (Pathfinding)

on:
  workflow_call:
    secrets:
      ASC_KEY_ID:
        required: true
      ASC_ISSUER_ID:
        required: true
      ASC_API_KEY_P8:
        required: true
      APPLE_TEAM_ID:
        required: true
      DIST_CERT_P12:
        required: true
      DIST_CERT_PASSWORD:
        required: true

jobs:
  testflight:
    runs-on: macos-26
    defaults:
      run:
        working-directory: apps/ios/Pathfinding
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v7

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Install XcodeGen
        run: |
          brew trust aws/tap azure/bicep || true
          brew install xcodegen

      - name: Write App Store Connect API key
        run: |
          mkdir -p private_keys
          printf '%s\n' "${{ secrets.ASC_API_KEY_P8 }}" > "private_keys/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Import distribution certificate
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.DIST_CERT_P12 }}
          p12-password: ${{ secrets.DIST_CERT_PASSWORD }}

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project Pathfinding.xcodeproj -scheme Pathfinding-Release

      - name: Run tests (gate)
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; c=[v for rt in d for v in d[rt] if v.get('isAvailable') and v['name'].startswith('iPhone')]; print(c[0]['udid'] if c else '')")
          if [ -z "$UDID" ]; then echo 'no available iPhone simulator'; exit 1; fi
          echo "Using simulator UDID: $UDID"
          xcodebuild test \
            -project Pathfinding.xcodeproj \
            -scheme Pathfinding-Debug \
            -destination "platform=iOS Simulator,id=$UDID" \
            -only-testing:PathfindingTests

      - name: Compute build number (UTC timestamp, monotonic)
        id: bn
        run: echo "build_number=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

      - name: Read marketing version (release-please / package.json)
        id: ver
        working-directory: ${{ github.workspace }}
        run: |
          VERSION=$(grep '"version"' package.json | head -1 | sed -E 's/.*"version": "(.+)".*/\1/')
          echo "marketing_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Archive
        run: |
          xcodebuild archive \
            -project Pathfinding.xcodeproj \
            -scheme Pathfinding-Release \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/Pathfinding.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            MARKETING_VERSION=${{ steps.ver.outputs.marketing_version }} \
            CURRENT_PROJECT_VERSION=${{ steps.bn.outputs.build_number }} \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$PWD/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Export IPA (clean PATH avoids Homebrew GNU rsync "Copy failed")
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>export</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
          </dict>
          </plist>
          EOF
          env PATH="/usr/bin:/bin:/usr/sbin:/sbin" xcodebuild -exportArchive \
            -archivePath build/Pathfinding.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$PWD/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v5
        with:
          app-path: apps/ios/Pathfinding/build/ipa/Pathfinding.ipa
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_API_KEY_P8 }}
          wait-for-processing: "false"

      - name: Clean up credentials
        if: always()
        run: rm -rf private_keys ExportOptions.plist