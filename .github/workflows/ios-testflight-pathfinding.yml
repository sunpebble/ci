name: iOS TestFlight (Pathfinding)

on:
  workflow_call:
    secrets:
      ASC_KEY_ID:
        required: true
      ASC_ISSUER_ID:
        required: true
      ASC_API_KEY_P8:
        required: true
      APPLE_DIST_CERT_P12_BASE64:
        required: true
      APPLE_DIST_CERT_PASSWORD:
        required: true
      APPLE_PROFILE_APP_BASE64:
        required: true

jobs:
  testflight:
    name: Build & Upload to TestFlight
    runs-on: macos-26
    defaults:
      run:
        working-directory: apps/ios/Pathfinding
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v7

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install ASC API key
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "${{ secrets.ASC_API_KEY_P8 }}" > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Import Apple Distribution certificate (persistent signing identity)
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.APPLE_DIST_CERT_P12_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          LOGIN_KEYCHAIN="$HOME/Library/Keychains/login.keychain-db"

          echo -n "$DIST_CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security default-keychain -s "$KEYCHAIN_PATH"
          if [ -f "$LOGIN_KEYCHAIN" ]; then
            security list-keychains -d user -s "$KEYCHAIN_PATH" "$LOGIN_KEYCHAIN"
          else
            security list-keychains -d user -s "$KEYCHAIN_PATH"
          fi

          security find-identity -v -p codesigning

      - name: Install provisioning profile
        env:
          PROFILE_APP_BASE64: ${{ secrets.APPLE_PROFILE_APP_BASE64 }}
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo -n "$PROFILE_APP_BASE64" | base64 --decode > "$PROFILES_DIR/pf_app_store.mobileprovision"
          ls -la "$PROFILES_DIR"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run unit tests (gate)
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; c=[v for rt in d for v in d[rt] if v.get('isAvailable') and v['name'].startswith('iPhone')]; print(c[0]['udid'] if c else '')")
          if [ -z "$UDID" ]; then echo 'no available iPhone simulator'; exit 1; fi
          echo "Using simulator UDID: $UDID"
          xcodebuild test \
            -project Pathfinding.xcodeproj \
            -scheme Pathfinding-Debug \
            -destination "platform=iOS Simulator,id=$UDID" \
            -only-testing:PathfindingTests

      - name: Compute build number (UTC timestamp, monotonic)
        id: bn
        run: echo "build_number=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

      - name: Read marketing version (release-please source of truth)
        id: ver
        run: |
          VERSION=$(grep '"version"' ../../../package.json | head -1 | sed -E 's/.*"version": "(.+)".*/\1/')
          echo "marketing_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Archive (manual distribution signing)
        run: |
          xcodebuild archive \
            -project Pathfinding.xcodeproj \
            -scheme Pathfinding-Release \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/Pathfinding.xcarchive \
            MARKETING_VERSION=${{ steps.ver.outputs.marketing_version }} \
            CURRENT_PROJECT_VERSION=${{ steps.bn.outputs.build_number }}

      - name: Export IPA
        run: |
          env PATH="/usr/bin:/bin:/usr/sbin:/sbin" xcodebuild -exportArchive \
            -archivePath build/Pathfinding.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to TestFlight (one retry)
        run: |
          ipas=(build/ipa/*.ipa)
          IPA="${ipas[0]}"
          echo "Uploading: $IPA"
          for attempt in 1 2; do
            if xcrun altool --upload-app -f "$IPA" -t ios \
                 --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"; then
              echo "upload ok"; exit 0
            fi
            echo "upload attempt $attempt failed; retrying in 30s"; sleep 30
          done
          echo "upload failed after retries"; exit 1