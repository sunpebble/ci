name: iOS TestFlight

on:
  workflow_call:
    inputs:
      working_directory:
        description: Repository-relative directory for xcodebuild (default repo root)
        type: string
        default: .
      xcode_project:
        description: Xcode project filename (e.g. Steady.xcodeproj)
        required: true
        type: string
      scheme:
        description: Xcode scheme to archive
        required: true
        type: string
      ipa_basename:
        description: Exported IPA basename without extension (e.g. Steady)
        required: true
        type: string
      run_xcodegen:
        description: Run xcodegen generate before archive
        type: boolean
        default: true
      build_number_strategy:
        description: run_number (default) or utc_timestamp
        type: string
        default: run_number
      marketing_version_from_repo_package_json:
        description: Read MARKETING_VERSION from repository root package.json
        type: boolean
        default: false
      archive_configuration:
        description: Optional xcodebuild -configuration (e.g. Release)
        type: string
        default: ""
      export_subdirectory:
        description: Subfolder under build/ for export (e.g. ipa). Empty exports to build/
        type: string
        default: ""
      upload_ipa_path:
        description: Repo-relative path to IPA for upload (overrides default build path)
        type: string
        default: ""
      run_test_gate:
        description: Run xcodebuild test on iPhone simulator before archive
        type: boolean
        default: false
      test_scheme:
        description: Scheme for test gate (when run_test_gate)
        type: string
        default: ""
      test_only:
        description: Optional -only-testing:Target for test gate
        type: string
        default: ""

jobs:
  testflight:
    runs-on: macos-26
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      XCODE_PROJECT: ${{ inputs.xcode_project }}
      SCHEME: ${{ inputs.scheme }}
      IPA_BASENAME: ${{ inputs.ipa_basename }}
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode 26
        run: |
          ls -d /Applications/Xcode*.app
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Install xcodegen
        if: inputs.run_xcodegen
        run: |
          for tap in $(brew tap); do
            case "$tap" in homebrew/*) ;; *) brew trust "$tap" ;; esac
          done
          brew install xcodegen

      - name: Import distribution certificate
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.DIST_CERT_P12 }}
          p12-password: ${{ secrets.DIST_CERT_PASSWORD }}

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          mkdir -p private_keys
          printf '%s\n' "$ASC_API_KEY_P8" > "private_keys/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Generate Xcode project
        if: inputs.run_xcodegen
        run: xcodegen generate

      - name: Run tests (gate)
        if: inputs.run_test_gate
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; c=[v for rt in d for v in d[rt] if v.get('isAvailable') and v['name'].startswith('iPhone')]; print(c[0]['udid'] if c else '')")
          if [ -z "$UDID" ]; then echo 'no available iPhone simulator'; exit 1; fi
          echo "Using simulator UDID: $UDID"
          EXTRA=""
          if [ -n "${{ inputs.test_only }}" ]; then EXTRA="-only-testing:${{ inputs.test_only }}"; fi
          xcodebuild test \
            -project "$XCODE_PROJECT" \
            -scheme "${{ inputs.test_scheme }}" \
            -destination "platform=iOS Simulator,id=$UDID" \
            $EXTRA

      - name: Compute build number (UTC timestamp)
        if: inputs.build_number_strategy == 'utc_timestamp'
        id: bn
        run: echo "build_number=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

      - name: Read marketing version from package.json
        if: inputs.marketing_version_from_repo_package_json
        id: ver
        run: |
          VERSION=$(grep '"version"' "${GITHUB_WORKSPACE}/package.json" | head -1 | sed -E 's/.*"version": "(.+)".*/\1/')
          echo "marketing_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Archive
        run: |
          if [ "${{ inputs.build_number_strategy }}" = "utc_timestamp" ]; then
            BUILD_NUMBER="${{ steps.bn.outputs.build_number }}"
          else
            BUILD_NUMBER="${{ github.run_number }}"
          fi
          CONFIG_ARGS=()
          if [ -n "${{ inputs.archive_configuration }}" ]; then
            CONFIG_ARGS=(-configuration "${{ inputs.archive_configuration }}" -sdk iphoneos)
          fi
          MV_ARGS=()
          if [ "${{ inputs.marketing_version_from_repo_package_json }}" = "true" ]; then
            MV_ARGS=(MARKETING_VERSION="${{ steps.ver.outputs.marketing_version }}")
          fi
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -destination 'generic/platform=iOS' \
            "${CONFIG_ARGS[@]}" \
            -archivePath "build/${IPA_BASENAME}.xcarchive" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            "${MV_ARGS[@]}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$PWD/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Export IPA
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>export</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
          </dict>
          </plist>
          EOF
          EXPORT_PATH="build"
          if [ -n "${{ inputs.export_subdirectory }}" ]; then
            EXPORT_PATH="build/${{ inputs.export_subdirectory }}"
            mkdir -p "$EXPORT_PATH"
          fi
          xcodebuild -exportArchive \
            -archivePath "build/${IPA_BASENAME}.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$EXPORT_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$PWD/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Resolve IPA path (repo root)
        id: ipa
        working-directory: ${{ github.workspace }}
        run: |
          if [ -n "${{ inputs.upload_ipa_path }}" ]; then
            echo "path=${{ inputs.upload_ipa_path }}" >> "$GITHUB_OUTPUT"
          else
            WD="${{ inputs.working_directory }}"
            if [ "$WD" = "." ]; then BASE=""; else BASE="${WD}/"; fi
            if [ -n "${{ inputs.export_subdirectory }}" ]; then
              echo "path=${BASE}build/${{ inputs.export_subdirectory }}/${{ inputs.ipa_basename }}.ipa" >> "$GITHUB_OUTPUT"
            else
              echo "path=${BASE}build/${{ inputs.ipa_basename }}.ipa" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v5
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_API_KEY_P8 }}
          wait-for-processing: "false"

      - name: Clean up credentials
        if: always()
        run: rm -rf private_keys ExportOptions.plist